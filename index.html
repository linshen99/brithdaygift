
     <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒的计时</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fce4ec; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 15px; padding: 30px; text-align: center; max-width: 500px; width: 90%; }
        h1 { color: #e91e63; font-size: 2.5em; margin-bottom: 20px; }
        #countdown span { font-size: 2em; font-weight: bold; color: #007bff; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 距离你的生日还有：</h1>
        <div id="countdown">
            <span id="days">00</span>天 
            <span id="hours">00</span>时 
            <span id="minutes">00</span>分 
            <span id="seconds">00</span>秒
        </div>
        <p class="mt-3 text-muted">恭喜用户黄麟成功升级+1，祝愿你生辰快乐！</p>
        <p >注意：时间并没有静止，本网站由鸡哥无限公司特别制作</p>
        <a href="memory.html" class="btn btn-primary mt-3">拆礼物</a>
        <a href="wish-1.html" class="btn btn-success mt-3 ms-2">去许个愿吧</a>
    </div>

    <!-- 引入 Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 确保DOM加载完成后再执行脚本
        document.addEventListener('DOMContentLoaded', function() {
            // 【修改这里】设置你的生日月份和日期
            const birthMonth = 6; 
            const birthDay = 21; 

            function updateCountdown() {
                const now = new Date();
                const currentYear = now.getFullYear();
                
                // 创建今年的生日对象 (注意：JS中月份从0开始，所以减1)
                let birthdayThisYear = new Date(currentYear, birthMonth - 1, birthDay);
                let targetDate = birthdayThisYear;

                // 如果今年的生日已经过了，就自动计算明年的
                if (now > birthdayThisYear) {
                    targetDate = new Date(currentYear + 1, birthMonth - 1, birthDay);
                }
                
                // 获取页面上的四个时间显示元素
                const daysEl = document.getElementById('days');
                const hoursEl = document.getElementById('hours');
                const minutesEl = document.getElementById('minutes');
                const secondsEl = document.getElementById('seconds');

                // 检查元素是否存在（防错处理）
                if (!daysEl || !hoursEl || !minutesEl || !secondsEl) {
                    console.error("找不到页面元素，请检查HTML结构！");
                    return; // 如果找不到元素，直接退出函数
                }

                // 核心逻辑：判断今天是不是生日当天
                const isBirthdayToday = (now.getMonth() === birthdayThisYear.getMonth()) && 
                                        (now.getDate() === birthdayThisYear.getDate());

                if (isBirthdayToday) {
                    // 🎉 如果是生日当天，强制显示全 00
                    daysEl.textContent = '00';
                    hoursEl.textContent = '00';
                    minutesEl.textContent = '00';
                    secondsEl.textContent = '00';
                    
                } else {
                    // ⏳ 如果不是生日当天，正常计算倒计时
                    const timeLeft = targetDate - now;
                    
                    const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

                    daysEl.textContent = String(days).padStart(2, '0');
                    hoursEl.textContent = String(hours).padStart(2, '0');
                    minutesEl.textContent = String(minutes).padStart(2, '0');
                    secondsEl.textContent = String(seconds).padStart(2, '0');
                }
            }

            // 每秒更新一次
            setInterval(updateCountdown, 1000);
            updateCountdown(); // 页面加载时立即执行一次，防止空白
        });
    </script>
</body>
</html>
    </script>
</body>
</html>
